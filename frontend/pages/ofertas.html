<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaburAI — Buscar empleo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/ofertas.css" />
</head>

<body>

  <!-- ══ NAVBAR ══ -->
  <nav id="navbar"></nav>

  <!-- ══ PAGE HEADER ══ -->
  <div class="page-header">
    <div class="page-header-inner">
      <div class="ph-left">
        <h1 class="ph-title">Buscar empleo</h1>
        <p class="ph-sub">Encontrá tu próxima oportunidad entre miles de ofertas en toda Argentina</p>
      </div>
      <!-- Barra de búsqueda integrada -->
      <div class="ph-search">
        <div class="search-box-sm">
          <div class="search-field-sm">
            <svg class="icon icon-xs"><use href="../assets/icons.svg#icon-search"></use></svg>
            <input type="text" id="searchQuery" placeholder="Puesto, empresa o rubro…" autocomplete="off" />
          </div>
          <div class="search-sep-sm"></div>
          <div class="search-field-sm search-field-sm--loc">
            <svg class="icon icon-xs"><use href="../assets/icons.svg#icon-location"></use></svg>
            <input type="text" id="searchLocation" placeholder="Ciudad o provincia" />
          </div>
          <button class="search-btn-sm" id="searchBtn">
            <svg class="icon icon-xs"><use href="../assets/icons.svg#icon-search"></use></svg>
            Buscar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ FILTROS ACTIVOS ══ -->
  <div class="active-filters-bar" id="activeFiltersBar" style="display:none">
    <div class="active-filters-inner">
      <span class="af-label">Filtros activos:</span>
      <div class="af-chips" id="activeChips"></div>
      <button class="af-clear" id="clearAllFilters">Limpiar todos</button>
    </div>
  </div>

  <!-- ══ LAYOUT PRINCIPAL ══ -->
  <div class="offers-layout">

    <!-- ── SIDEBAR DE FILTROS ── -->
    <aside class="filters-sidebar" id="filtersSidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Filtros</span>
        <button class="sidebar-reset" id="resetFilters">Limpiar</button>
      </div>

      <!-- Rubro -->
      <div class="filter-group">
        <div class="filter-group-header" data-toggle="rubro">
          <span>Rubro</span>
          <svg class="toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>
        <div class="filter-group-body" id="rubro">
          <!-- Se carga dinámicamente desde la API -->
        </div>
      </div>

      <!-- Modalidad -->
      <div class="filter-group">
        <div class="filter-group-header" data-toggle="modalidad">
          <span>Modalidad</span>
          <svg class="toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>
        <div class="filter-group-body" id="modalidad">
          <!-- Dinámico -->
        </div>
      </div>

      <!-- Tipo de jornada -->
      <div class="filter-group">
        <div class="filter-group-header" data-toggle="jornada">
          <span>Jornada</span>
          <svg class="toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>
        <div class="filter-group-body" id="jornada">
          <!-- Dinámico -->
        </div>
      </div>

      <!-- Experiencia -->
      <div class="filter-group">
        <div class="filter-group-header" data-toggle="experiencia">
          <span>Experiencia</span>
          <svg class="icon icon-xs toggle-icon"><use href="../assets/icons.svg#icon-chevron-down"></use></svg>
        </div>
        <div class="filter-group-body" id="experiencia">
          <!-- Dinámico -->
        </div>
      </div>

      <!-- Salario -->
      <div class="filter-group">
        <div class="filter-group-header" data-toggle="salario">
          <span>Salario mínimo</span>
          <svg class="toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>
        <div class="filter-group-body" id="salario">
          <div class="salary-slider-wrap">
            <input type="range" id="salaryRange" min="0" max="1500000" step="50000" value="0" class="salary-slider" />
            <div class="salary-display">
              <span class="salary-min-label">Sin mínimo</span>
              <span class="salary-cur" id="salaryDisplay">$0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Botón aplicar en mobile -->
      <button class="btn-primary apply-filters-btn" id="applyFiltersBtn">
        Ver resultados
      </button>
    </aside>

    <!-- ── CONTENIDO PRINCIPAL ── -->
    <main class="offers-main">

      <!-- Toolbar: resultado + ordenar -->
      <div class="results-toolbar">
        <div class="results-count">
          <span class="rc-num" id="resultsCount">0</span>
          <span class="rc-label">ofertas encontradas</span>
        </div>
        <div class="toolbar-right">
          <div class="sort-wrap">
            <label class="sort-label" for="sortSelect">Ordenar por</label>
            <select class="sort-select" id="sortSelect">
              <option value="recientes">Más recientes</option>
              <option value="salario-asc">Menor salario</option>
              <option value="salario-desc">Mayor salario</option>
            </select>
          </div>
          <!-- Botón filtros mobile -->
          <button class="btn-ghost filters-toggle-btn" id="filtersToggleBtn">
            <svg class="icon icon-xs"><use href="../assets/icons.svg#icon-filter"></use></svg>
            Filtros
          </button>
        </div>
      </div>

      <!-- Grid de tarjetas -->
      <div class="offers-grid" id="offersGrid"></div>

      <!-- Paginación -->
      <div class="pagination" id="pagination"></div>

    </main>
  </div>

  <!-- Overlay mobile para sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>


  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ofertas.js"></script>
</body>

</html>
